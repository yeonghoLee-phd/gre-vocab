<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0b1020" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>GRE 단어장 3000</title>
<style>
:root{
  --bg:#0b1020;--bg2:#0f1530;--card:#161c3a;--card2:#1c2348;--line:rgba(255,255,255,.1);
  --text:#eef0fb;--dim:#a7abc8;--faint:#6d7294;
  --acc:#8b7bff;--acc2:#c084fc;--acc3:#f472b6;--accS:rgba(139,123,255,.18);
  --good:#34d399;--goodS:rgba(52,211,153,.15);--bad:#fb7185;--badS:rgba(251,113,133,.15);--warn:#fbbf24;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo",-apple-system,system-ui,sans-serif;
  background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--text);
  font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
  -webkit-user-select:none;user-select:none;
}
header{
  position:sticky;top:0;z-index:20;
  padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
  background:rgba(11,16,32,.85);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
header h1{margin:0;font-size:17px;font-weight:800}
header h1 em{font-style:normal;background:linear-gradient(90deg,var(--acc),var(--acc3));-webkit-background-clip:text;background-clip:text;color:transparent}
#headInfo{font-size:12px;color:var(--faint);font-weight:700}
main{padding:16px 16px 8px}
.view{display:none}
.view.on{display:block;animation:vin .25s ease}
@keyframes vin{from{opacity:0;transform:translateY(8px)}}

/* ---- bottom tabs ---- */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;
  background:rgba(13,18,38,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
nav button{
  flex:1;border:none;background:none;color:var(--faint);
  font:inherit;font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 0;border-radius:14px;cursor:pointer;
}
nav button .ico{font-size:21px;line-height:1}
nav button.on{color:var(--acc);background:var(--accS)}

/* ---- common ---- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
h2{margin:0 0 4px;font-size:17px;font-weight:800}
.sub{margin:0 0 12px;font-size:12.5px;color:var(--dim)}
select,button.btn{
  font:inherit;color:var(--text);
  background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;font-size:14px;font-weight:600;
}
select:focus{outline:none;border-color:var(--acc)}
button.btn{cursor:pointer}
button.btn.pri{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;font-weight:800}
button.btn.pri:disabled{opacity:.45}
button.btn.ghost{background:transparent}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chiprow{display:flex;gap:7px;flex-wrap:wrap}
.chip{
  padding:9px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--card2);color:var(--dim);font:inherit;font-size:13px;font-weight:700;cursor:pointer;
}
.chip.on{background:var(--accS);border-color:var(--acc);color:var(--acc)}
.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin:10px 0}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc3));transition:width .4s ease}
.empty{color:var(--faint);text-align:center;padding:18px 0;font-size:13.5px}
.day-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-height:260px;overflow-y:auto;padding:2px}
.day-cell{
  padding:10px 4px;border-radius:12px;border:1px solid var(--line);
  background:var(--card2);color:var(--text);font:inherit;font-size:13px;font-weight:800;
  text-align:center;cursor:pointer;
}
.day-cell small{display:block;font-size:9.5px;font-weight:600;color:var(--faint)}
.day-cell.done{border-color:var(--good);color:var(--good)}
.day-cell.sel{border-color:var(--acc);background:var(--accS);color:var(--acc)}

/* ---- 단어장 ---- */
.wl-item{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:11px 13px;border-bottom:1px solid var(--line);
}
.wl-item:last-child{border-bottom:none}
.wl-item strong{font-size:16.5px;font-family:Georgia,serif;letter-spacing:-.01em}
.wl-item .spk{border:none;background:none;font-size:15px;padding:2px 8px 2px 0;cursor:pointer;color:var(--faint)}
.wl-item .cat{font-size:9.5px;font-weight:800;color:var(--acc);background:var(--accS);border-radius:99px;padding:2px 7px;margin-left:6px;vertical-align:2px;font-family:inherit}
.wl-item span.ko{color:var(--dim);font-size:13.5px;text-align:right;flex-shrink:0;max-width:52%}
.wl-item.hide span.ko{filter:blur(6px)}
.wl-item.hide.reveal span.ko{filter:none}
.wl-list{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}

/* ---- 깜빡이 ---- */
.blink-stage{
  min-height:46vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:radial-gradient(340px 160px at 50% 0%,var(--accS),transparent 70%),var(--card);
  border:1px solid var(--line);border-radius:20px;padding:30px 20px;text-align:center;cursor:pointer;
}
.bw{font-size:42px;font-weight:800;font-family:Georgia,serif;animation:vin .2s ease}
.bw.dim{opacity:.45;font-size:26px}
.bk{font-size:22px;font-weight:700;color:var(--acc);animation:vin .2s ease}
.bk.ph{color:var(--faint)}
.bd{font-size:13.5px;color:var(--dim)}
.blink-hint{text-align:center;color:var(--faint);font-size:12px;margin-top:10px}

/* ---- 퀴즈/시험 ---- */
.q-word{font-size:34px;font-weight:800;font-family:Georgia,serif;text-align:center;margin:20px 0;animation:vin .2s ease}
.q-choices{display:grid;gap:9px}
.qc{
  display:flex;align-items:center;gap:11px;width:100%;
  border:1px solid var(--line);border-radius:14px;background:var(--card2);
  padding:13px 14px;font:inherit;font-size:14.5px;color:var(--text);text-align:left;cursor:pointer;
}
.qc .n{
  width:24px;height:24px;flex-shrink:0;display:grid;place-items:center;border-radius:8px;
  border:1px solid var(--line);font-size:11px;font-weight:800;color:var(--faint);
}
.qc.ok{border-color:var(--good);background:var(--goodS)}
.qc.ok .n{background:var(--good);border-color:var(--good);color:#fff}
.qc.no{border-color:var(--bad);background:var(--badS)}
.qc.no .n{background:var(--bad);border-color:var(--bad);color:#fff}
.stat{font-size:12.5px;color:var(--dim)}
.rev{display:grid;gap:8px;margin-top:14px}
.rev-i{border:1px solid var(--line);border-radius:13px;background:var(--card2);padding:10px 13px;font-size:13.5px}
.rev-i.ok{border-left:3px solid var(--good)}
.rev-i.no{border-left:3px solid var(--bad)}
.rev-i strong{font-family:Georgia,serif;font-size:15px}
.rev-i .a-ok{color:var(--good);font-weight:600;display:block}
.rev-i .a-no{color:var(--bad);font-weight:600;display:block}
.score{display:flex;align-items:baseline;gap:12px;margin:4px 0 10px}
.score strong{font-size:36px;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc3));-webkit-background-clip:text;background-clip:text;color:transparent}
.score span{color:var(--dim);font-size:13.5px}
.log-row{display:flex;justify-content:space-between;gap:8px;padding:9px 12px;border:1px solid var(--line);border-radius:11px;background:var(--card2);font-size:12.5px;margin-bottom:7px}
.log-row span{color:var(--dim)}
.done-box{text-align:center;padding:14px 0}
.done-box h3{font-size:20px;margin:0 0 6px}
label.ck{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--dim)}
input[type=checkbox]{width:17px;height:17px;accent-color:var(--acc)}
</style>
</head>
<body>
<header>
  <h1>GRE <em>단어장</em> 3000</h1>
  <span id="headInfo"></span>
</header>

<main>
  <!-- ================= 단어장 ================= -->
  <section id="v-list" class="view on">
    <div class="panel">
      <h2>Day별 단어장</h2>
      <p class="sub">하루 50개 · 데스크톱 앱과 동일한 Day 구성</p>
      <div class="row">
        <select id="wlDay" style="flex:1"></select>
        <label class="ck"><input type="checkbox" id="wlHide" /> 뜻 가리기</label>
      </div>
    </div>
    <div class="wl-list" id="wlList"></div>
  </section>

  <!-- ================= 깜빡이 ================= -->
  <section id="v-blink" class="view">
    <div class="panel">
      <h2>깜빡이 암기</h2>
      <p class="sub">단어 → 뜻이 자동으로 깜빡깜빡. 화면을 누르면 시작/정지.</p>
      <div class="row">
        <select id="bkDay" style="flex:1"></select>
        <select id="bkSpeed">
          <option value="1400">빠르게</option>
          <option value="2200" selected>보통</option>
          <option value="3500">느리게</option>
        </select>
      </div>
      <div class="row" style="margin-top:8px">
        <select id="bkMode" style="flex:1">
          <option value="seq" selected>단어 → 뜻 순서로</option>
          <option value="together">단어+뜻 동시에</option>
        </select>
        <label class="ck"><input type="checkbox" id="bkShuffle" /> 섞기</label>
        <label class="ck"><input type="checkbox" id="bkTts" /> 발음</label>
      </div>
    </div>
    <div class="blink-stage" id="bkStage"><div class="bk ph">화면을 누르면 시작</div></div>
    <p class="blink-hint" id="bkMeta"></p>
    <div class="row" style="justify-content:center;margin-top:6px">
      <button class="btn" id="bkPrev">← 이전</button>
      <button class="btn pri" id="bkToggle">▶ 시작</button>
      <button class="btn" id="bkNext">다음 →</button>
    </div>
  </section>

  <!-- ================= Day 퀴즈 ================= -->
  <section id="v-quiz" class="view">
    <div id="dqSetup">
      <div class="panel">
        <h2>Day 마스터 퀴즈</h2>
        <p class="sub">그 Day 50개를 5지선다로. 틀린 단어는 계속 다시 나와서 전부 맞혀야 끝!</p>
        <div class="day-grid" id="dqGrid"></div>
      </div>
    </div>
    <div id="dqArea"></div>
  </section>

  <!-- ================= 단어 시험 ================= -->
  <section id="v-test" class="view">
    <div id="wtSetup">
      <div class="panel">
        <h2>단어 시험</h2>
        <p class="sub">Day 여러 개 선택 → 문제 수 선택 → 시험 → 리뷰</p>
        <div class="day-grid" id="wtGrid"></div>
        <div class="chiprow" style="margin-top:10px" id="wtCounts">
          <button class="chip" data-c="10">10</button>
          <button class="chip on" data-c="20">20</button>
          <button class="chip" data-c="30">30</button>
          <button class="chip" data-c="40">40</button>
          <button class="chip" data-c="50">50</button>
        </div>
        <p class="stat" id="wtInfo" style="margin:10px 0"></p>
        <button class="btn pri" id="wtStart" style="width:100%" disabled>시험 시작</button>
      </div>
      <div class="panel">
        <h2 style="font-size:14px">최근 기록</h2>
        <div id="wtHist"></div>
      </div>
    </div>
    <div id="wtArea"></div>
  </section>
</main>

<nav>
  <button data-v="v-list" class="on"><span class="ico">📖</span>단어장</button>
  <button data-v="v-blink"><span class="ico">⚡</span>깜빡이</button>
  <button data-v="v-quiz"><span class="ico">✅</span>Day 퀴즈</button>
  <button data-v="v-test"><span class="ico">📝</span>시험</button>
</nav>

const store=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const W=0,K=1,C=2,DF=3;
$("#headInfo").textContent=`${DAYS.length} Days · ${DAYS.reduce((s,d)=>s+d.length,0)}단어`;

function speak(w){
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=0.95;speechSynthesis.speak(u);}catch{}
}
function dayOptions(sel){
  sel.innerHTML=DAYS.map((d,i)=>`<option value="${i}">Day ${i+1} (${d.length}단어)</option>`).join("");
}
function makeQ(card,poolDays){
  const donors=[];
  poolDays.forEach(di=>DAYS[di].forEach(c=>{if(c[W]!==card[W]&&c[K]&&c[K]!==card[K])donors.push(c);}));
  const opts=[card[K]];
  for(const d of shuf(donors)){if(opts.length>=5)break;if(!opts.includes(d[K]))opts.push(d[K]);}
  const ch=shuf(opts);
  return{choices:ch,answer:ch.indexOf(card[K])};
}

/* ---------------- tabs ---------------- */
$$("nav button").forEach(b=>b.addEventListener("click",()=>{
  $$("nav button").forEach(x=>x.classList.toggle("on",x===b));
  $$(".view").forEach(v=>v.classList.toggle("on",v.id===b.dataset.v));
  if(b.dataset.v!=="v-blink")stopBk();
  window.scrollTo(0,0);
}));

/* ================= 단어장 ================= */
dayOptions($("#wlDay"));
function renderList(){
  const d=Number($("#wlDay").value), hide=$("#wlHide").checked;
  $("#wlList").innerHTML=DAYS[d].map((c,i)=>
    `<div class="wl-item${hide?" hide":""}" data-i="${i}">`+
    `<div><button class="spk" data-w="${esc(c[W])}">\uD83D\uDD0A</button><strong>${esc(c[W])}</strong>${c[C]?`<span class="cat">${c[C]}</span>`:""}</div>`+
    `<span class="ko">${esc(c[K])}</span></div>`).join("");
  $$("#wlList .wl-item").forEach(el=>el.addEventListener("click",()=>{
    if($("#wlHide").checked)el.classList.toggle("reveal");
  }));
  $$("#wlList .spk").forEach(b=>b.addEventListener("click",(e)=>{e.stopPropagation();speak(b.dataset.w);}));
}
$("#wlDay").addEventListener("change",renderList);
$("#wlHide").addEventListener("change",renderList);
renderList();

/* ================= 깜빡이 ================= */
dayOptions($("#bkDay"));
let bk={t:null,run:false,list:[],idx:0,ph:0};
function bkLoad(){
  const d=Number($("#bkDay").value);
  bk.list=$("#bkShuffle").checked?shuf(DAYS[d]):DAYS[d].slice();
  bk.idx=0;bk.ph=0;
}
function bkPaint(){
  if(!bk.list.length)bkLoad();
  const c=bk.list[bk.idx];
  const together=$("#bkMode").value==="together";
  const showKo=together||bk.ph===1;
  if($("#bkTts").checked&&bk.ph===0&&bk.run)speak(c[W]);
  $("#bkStage").innerHTML=
    `<div class="bw${showKo&&!together?" dim":""}">${esc(c[W])}</div>`+
    (showKo?`<div class="bk">${esc(c[K])}</div>`+(c[DF]?`<div class="bd">${esc(c[DF])}</div>`:"")
           :`<div class="bk ph">···</div>`);
  $("#bkMeta").textContent=`Day ${Number($("#bkDay").value)+1} · ${bk.idx+1} / ${bk.list.length}`;
}
function bkTick(){
  if(!bk.run)return;
  bkPaint();
  const iv=Number($("#bkSpeed").value), together=$("#bkMode").value==="together";
  bk.t=setTimeout(()=>{
    if(together||bk.ph===1){bk.idx=(bk.idx+1)%bk.list.length;bk.ph=0;}
    else bk.ph=1;
    bkTick();
  },together?iv*1.8:(bk.ph===0?iv*0.9:iv));
}
function startBk(){if(!bk.list.length)bkLoad();bk.run=true;$("#bkToggle").textContent="⏸ 정지";bkTick();}
function stopBk(){bk.run=false;if(bk.t)clearTimeout(bk.t);$("#bkToggle").textContent="▶ 시작";}
$("#bkToggle").addEventListener("click",()=>bk.run?stopBk():startBk());
$("#bkStage").addEventListener("click",()=>bk.run?stopBk():startBk());
$("#bkPrev").addEventListener("click",()=>{if(bk.t)clearTimeout(bk.t);bk.idx=(bk.idx-1+bk.list.length)%bk.list.length;bk.ph=0;bkPaint();if(bk.run)bkTick();});
$("#bkNext").addEventListener("click",()=>{if(bk.t)clearTimeout(bk.t);bk.idx=(bk.idx+1)%bk.list.length;bk.ph=0;bkPaint();if(bk.run)bkTick();});
$("#bkDay").addEventListener("change",()=>{stopBk();bkLoad();bkPaint();});
$("#bkShuffle").addEventListener("change",()=>{stopBk();bkLoad();bkPaint();});
bkLoad();bkPaint();

/* ================= Day 퀴즈 ================= */
let quiz=null;
function quizSetup(){
  const prog=store(PROG,{});
  $("#dqGrid").innerHTML=DAYS.map((d,i)=>
    `<button class="day-cell${prog[i]?" done":""}" data-d="${i}">D${i+1}${prog[i]?" ✓":""}<small>${d.length}</small></button>`).join("");
  $$("#dqGrid .day-cell").forEach(b=>b.addEventListener("click",()=>startQuiz(Number(b.dataset.d))));
  $("#dqArea").innerHTML="";
  $("#dqSetup").style.display="";
}
function startQuiz(day){
  quiz={day,queue:shuf(DAYS[day]),done:0,total:DAYS[day].length,tries:0,wrong:new Set(),lock:false};
  $("#dqSetup").style.display="none";
  quizQ();
}
function quizQ(){
  if(!quiz)return;
  if(!quiz.queue.length)return quizDone();
  const card=quiz.queue[0];
  const {choices,answer}=makeQ(card,[quiz.day]);
  quiz.cur={card,choices,answer};quiz.lock=false;
  const pct=Math.round(quiz.done/quiz.total*100);
  $("#dqArea").innerHTML=
    `<div class="panel">`+
    `<div class="row" style="justify-content:space-between">`+
    `<span class="stat"><strong>Day ${quiz.day+1}</strong> · 마스터 ${quiz.done}/${quiz.total} · 남은 ${quiz.queue.length} · 시도 ${quiz.tries}</span>`+
    `<button class="btn ghost" id="dqQuit" style="padding:6px 10px;font-size:12px">그만</button></div>`+
    `<div class="bar"><div class="fill" style="width:${pct}%"></div></div>`+
    `<div class="q-word">${esc(card[W])}</div>`+
    `<div class="q-choices">`+choices.map((c,i)=>
      `<button class="qc" data-i="${i}"><span class="n">${i+1}</span>${esc(c)}</button>`).join("")+
    `</div></div>`;
  $("#dqQuit").addEventListener("click",()=>{quiz=null;quizSetup();});
  $$("#dqArea .qc").forEach(b=>b.addEventListener("click",()=>quizAns(Number(b.dataset.i))));
}
function quizAns(i){
  if(!quiz||quiz.lock)return;
  quiz.lock=true;quiz.tries++;
  const{card,answer}=quiz.cur, ok=i===answer;
  $$("#dqArea .qc").forEach((b,bi)=>{
    if(bi===answer)b.classList.add("ok");
    if(bi===i&&!ok)b.classList.add("no");
    b.disabled=true;
  });
  quiz.queue.shift();
  if(ok)quiz.done++;
  else{quiz.wrong.add(card[W]);quiz.queue.splice(Math.min(quiz.queue.length,3+Math.floor(Math.random()*5)),0,card);}
  setTimeout(quizQ,ok?500:1500);
}
function quizDone(){
  const prog=store(PROG,{});
  prog[quiz.day]={tries:quiz.tries,wrong:[...quiz.wrong]};
  save(PROG,prog);
  const acc=Math.round(quiz.total/quiz.tries*100);
  const wrongHtml=[...quiz.wrong].map(w=>{
    const c=DAYS[quiz.day].find(x=>x[W]===w);
    return `<div class="rev-i no"><strong>${esc(w)}</strong> <span class="stat">${esc(c?c[K]:"")}</span></div>`;
  }).join("");
  const day=quiz.day, tries=quiz.tries;quiz=null;
  $("#dqArea").innerHTML=
    `<div class="panel done-box">`+
    `<h3>🎉 Day ${day+1} 완전 정복!</h3>`+
    `<p class="stat">단어 ${DAYS[day].length}개 · 총 시도 ${tries}회 · 1회차 정확도 ${acc}%</p>`+
    (wrongHtml?`<p class="stat" style="color:var(--bad);font-weight:700;margin-top:10px">헷갈렸던 단어 — 자기 전에 한 번 더!</p><div class="rev">${wrongHtml}</div>`:`<p class="stat">한 번도 안 틀렸어요. 완벽!</p>`)+
    `<div class="row" style="justify-content:center;margin-top:14px">`+
    `<button class="btn pri" id="dqRetry">같은 Day 다시</button>`+
    `<button class="btn" id="dqBack">다른 Day</button></div></div>`;
  $("#dqRetry").addEventListener("click",()=>startQuiz(day));
  $("#dqBack").addEventListener("click",quizSetup);
}
quizSetup();

/* ================= 단어 시험 ================= */
let test=null;
function testSetup(){
  test=null;
  $("#wtGrid").innerHTML=DAYS.map((d,i)=>
    `<button class="day-cell" data-d="${i}">D${i+1}<small>${d.length}</small></button>`).join("");
  $$("#wtGrid .day-cell").forEach(b=>b.addEventListener("click",()=>{b.classList.toggle("sel");wtInfo();}));
  $$("#wtCounts .chip").forEach(b=>b.addEventListener("click",()=>{
    $$("#wtCounts .chip").forEach(x=>x.classList.toggle("on",x===b));wtInfo();
  }));
  $("#wtArea").innerHTML="";
  $("#wtSetup").style.display="";
  wtHist();wtInfo();
}
const selDays=()=>$$("#wtGrid .day-cell.sel").map(b=>Number(b.dataset.d));
const selCount=()=>Number($("#wtCounts .chip.on")?.dataset.c||20);
function wtInfo(){
  const ds=selDays(), pool=ds.reduce((s,d)=>s+DAYS[d].length,0);
  $("#wtInfo").textContent=ds.length?`선택: ${ds.map(d=>"Day"+(d+1)).join(", ")} · ${pool}단어 중 ${Math.min(selCount(),pool)}문제`:"Day를 하나 이상 선택하세요.";
  $("#wtStart").disabled=!ds.length;
}
$("#wtStart").addEventListener("click",()=>{
  const ds=selDays();if(!ds.length)return;
  const pool=ds.flatMap(d=>DAYS[d]);
  const cards=shuf(pool).slice(0,Math.min(selCount(),pool.length));
  test={days:ds,items:cards.map(c=>{const m=makeQ(c,ds);return{card:c,choices:m.choices,answer:m.answer,pick:-1};}),idx:0};
  $("#wtSetup").style.display="none";
  wtQ();
});
function wtQ(){
  const it=test.items[test.idx];
  const pct=Math.round(test.idx/test.items.length*100);
  $("#wtArea").innerHTML=
    `<div class="panel">`+
    `<div class="row" style="justify-content:space-between">`+
    `<span class="stat"><strong>단어 시험</strong> · ${test.idx+1}/${test.items.length} · ${test.days.map(d=>"D"+(d+1)).join("·")}</span>`+
    `<button class="btn ghost" id="wtQuit" style="padding:6px 10px;font-size:12px">그만</button></div>`+
    `<div class="bar"><div class="fill" style="width:${pct}%"></div></div>`+
    `<div class="q-word">${esc(it.card[W])}</div>`+
    `<div class="q-choices">`+it.choices.map((c,i)=>
      `<button class="qc" data-i="${i}"><span class="n">${i+1}</span>${esc(c)}</button>`).join("")+
    `</div><p class="stat" style="text-align:center;margin-top:10px">결과는 마지막에 한 번에</p></div>`;
  $("#wtQuit").addEventListener("click",testSetup);
  $$("#wtArea .qc").forEach(b=>b.addEventListener("click",()=>{
    test.items[test.idx].pick=Number(b.dataset.i);
    test.idx++;
    test.idx>=test.items.length?wtDone():wtQ();
  }));
}
function wtDone(){
  const total=test.items.length, right=test.items.filter(t=>t.pick===t.answer).length;
  const score=Math.round(right/total*100);
  const hist=store(HIST,[]);
  hist.unshift({ts:new Date().toISOString().slice(5,16).replace("T"," "),days:test.days.map(d=>d+1),count:total,right,score});
  save(HIST,hist.slice(0,20));
  const rows=test.items.map((it,n)=>{
    const ok=it.pick===it.answer;
    return `<div class="rev-i ${ok?"ok":"no"}" data-w="${ok?0:1}">`+
      `<strong>Q${n+1}. ${esc(it.card[W])}</strong>`+
      (ok?`<span class="a-ok">✓ ${esc(it.choices[it.answer])}</span>`
         :`<span class="a-no">✗ 내 답: ${it.pick>=0?esc(it.choices[it.pick]):"(무응답)"}</span><span class="a-ok">✓ 정답: ${esc(it.choices[it.answer])}</span>`)+
      `</div>`;
  }).join("");
  const grade=score===100?"💯 만점!":score>=80?"🔥 훌륭해요":score>=60?"📚 조금만 더":"🔁 깜빡이로 복습 추천";
  const cfg={days:test.days,count:total};
  test=null;
  $("#wtArea").innerHTML=
    `<div class="panel">`+
    `<div class="score"><strong>${right}/${total}</strong><span>정답률 ${score}% · ${grade}</span></div>`+
    `<div class="row">`+
    `<button class="btn pri" id="wtAgain">같은 설정 다시</button>`+
    `<button class="btn" id="wtNew">새 설정</button>`+
    `<button class="btn ghost" id="wtWrong">오답만</button></div>`+
    `<div class="rev" id="wtRev">${rows}</div></div>`;
  $("#wtNew").addEventListener("click",testSetup);
  $("#wtAgain").addEventListener("click",()=>{
    testSetup();
    cfg.days.forEach(d=>{const b=document.querySelector(`#wtGrid [data-d="${d}"]`);if(b)b.classList.add("sel");});
    $$("#wtCounts .chip").forEach(x=>x.classList.toggle("on",Number(x.dataset.c)===cfg.count));
    wtInfo();
    $("#wtStart").click();
  });
  let wo=false;
  $("#wtWrong").addEventListener("click",(e)=>{
    wo=!wo;e.target.textContent=wo?"전체":"오답만";
    $$("#wtRev .rev-i").forEach(el=>{el.style.display=wo&&el.dataset.w==="0"?"none":"";});
  });
}
function wtHist(){
  const hist=store(HIST,[]);
  $("#wtHist").innerHTML=hist.length?hist.map(h=>
    `<div class="log-row"><span>${esc(h.ts)} · D${h.days.join(",")} · ${h.count}문제</span><strong>${h.right}/${h.count} (${h.score}%)</strong></div>`).join("")
    :`<div class="empty">아직 기록이 없어요.</div>`;
}
testSetup();
if(location.protocol==="https:"&&"serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
</script>
